name: Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # macOS-14 is ARM64, only test recent Python versions
          - os: macos-14
            python-version: '3.8'
          - os: macos-14
            python-version: '3.9'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev
      
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zlib || true
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest
      
      - name: Build and install package
        run: |
          pip install -e .
      
      - name: Test import
        run: |
          python -c "import pyics; print('✓ pyics imported successfully')"
          python -c "from pyics import imread, imwrite; print('✓ Functions imported successfully')"
      
      - name: Test basic functionality
        run: |
          python -c '
import pyics
import numpy as np

# Test imwrite
test_img = np.random.randint(0, 255, (100, 100), dtype=np.uint8)
pyics.imwrite("test.ics", test_img)
print("✓ imwrite test passed")

# Test imread
img, metadata = pyics.imread("test.ics", fix_dimensions=False)
print(f"✓ imread test passed - shape: {img.shape}")

assert img.shape == (100, 100), f"Shape mismatch: {img.shape}"
print("✓ All tests passed")
'
      
      - name: Check installed location
        run: |
          python -c "import pyics; print(f'Installed at: {pyics.__file__}')"
          python -c "import pyics; print(f'Version: {pyics.__version__}')"

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
      
      - name: Check with flake8
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 src/pyics --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 src/pyics --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        continue-on-error: true
      
      - name: Check formatting with black
        run: |
          black --check src/pyics --line-length 100
        continue-on-error: true

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest pytest-cov
          pip install -e .
      
      - name: Run tests with coverage
        run: |
          python -c '
import pyics
import numpy as np

print("Running basic coverage tests...")

# Test multiple data types
for dtype in [np.uint8, np.uint16, np.int16, np.float32, np.float64]:
    img = np.random.randint(0, 100, (50, 50)).astype(dtype)
    pyics.imwrite(f"test_{dtype.__name__}.ics", img)
    loaded, _ = pyics.imread(f"test_{dtype.__name__}.ics", fix_dimensions=False)
    assert loaded.dtype == dtype
    print(f"✓ {dtype.__name__} test passed")

print("✓ All coverage tests passed")
'
        continue-on-error: true
