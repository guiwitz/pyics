name: Build Wheels

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zlib
      
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.16.5
      
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Build for Python 3.8-3.12
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          
          # Skip 32-bit builds and musllinux (for simplicity)
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          
          # Platform-specific settings
          # manylinux containers run as root and use yum
          CIBW_BEFORE_BUILD_LINUX: yum install -y zlib-devel || true
          CIBW_BEFORE_BUILD_MACOS: brew install zlib || true
          CIBW_BEFORE_BUILD_WINDOWS: ""
          
          # Test the wheels
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: python -c "import pyics; print('✓ Import successful')"
          
          # Build settings
          CIBW_BUILD_VERBOSITY: 1
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Build sdist
        run: python -m build --sdist
      
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  test_wheels:
    name: Test wheels on ${{ matrix.os }}
    needs: [build_wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
        python-version: ['3.9', '3.11', '3.12']
    
    steps:
      - name: Checkout code (for tests)
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse
      
      - name: Install wheel
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install wheelhouse/*.whl
        shell: bash
      
      - name: Test import
        run: python -c "import pyics; print('✓ Import successful')"
      
      - name: Run basic test
        run: |
          python -c "
          import numpy as np
          from pyics import imread, imwrite
          
          # Create test image
          img = np.random.randint(0, 255, (100, 100), dtype=np.uint8)
          
          # Write
          imwrite('test.ics', img)
          print('✓ Write successful')
          
          # Read
          img2, meta = imread('test.ics', fix_dimensions=False)
          print('✓ Read successful')
          
          # Verify
          assert np.array_equal(img, img2)
          print('✓ Data integrity verified')
          print(f'✓ All tests passed on {meta[\"dtype\"].__name__}')
          "

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist, test_wheels]
    runs-on: ubuntu-latest
    # Only upload on tagged releases
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
      
      - name: Organize artifacts
        run: |
          mkdir -p dist
          mv dist-all/wheels-*/*.whl dist/
          mv dist-all/sdist/*.tar.gz dist/
          ls -lh dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
