name: Build Wheels

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} ${{ matrix.python-version && format('- Python {0}', matrix.python-version) || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: single job builds all Python versions via cibuildwheel
          - os: ubuntu-22.04
            python-version: '3.12'
          # macOS: separate job per Python version for manual builds
          - os: macos-14
            python-version: '3.10'
          - os: macos-14
            python-version: '3.11'
          - os: macos-14
            python-version: '3.12'
          - os: macos-14
            python-version: '3.13'
          # Windows: separate job per Python version for manual builds
          - os: windows-2022
            python-version: '3.10'
          - os: windows-2022
            python-version: '3.11'
          - os: windows-2022
            python-version: '3.12'
          - os: windows-2022
            python-version: '3.13'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache cibuildwheel tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/cibuildwheel
            ~/Library/Caches/cibuildwheel
          key: ${{ runner.os }}-cibuildwheel-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-cibuildwheel-
      
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zlib
      
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
      
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build wheels (macOS - manual)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip wheel build setuptools
          python -m pip wheel . --wheel-dir=wheelhouse --no-deps -v
      
      - name: Build wheels (Windows - manual)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip wheel build setuptools
          python -m pip wheel . --wheel-dir=wheelhouse --no-deps -v
      
      - name: Build wheels (Linux - cibuildwheel)
        if: runner.os == 'Linux'
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: wheelhouse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_BEFORE_BUILD_LINUX: yum install -y zlib-devel || true
          CIBW_BUILD_VERBOSITY: 1
      
      - name: Inspect built wheels
        run: |
          echo "=== Listing wheels ==="
          ls -lh wheelhouse/
          echo "=== Inspecting first wheel contents ==="
          FIRST_WHEEL=$(ls wheelhouse/*.whl | head -1)
          python -m zipfile -l "$FIRST_WHEEL" | head -50
        shell: bash
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Build sdist
        run: python -m build --sdist
      
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  test_wheels:
    name: Test wheels on ${{ matrix.os }}
    needs: [build_wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    steps:
      - name: Checkout code (for tests)
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.os == 'ubuntu-22.04' && '3.12' || matrix.python-version }}
          path: wheelhouse
        continue-on-error: true
      
      - name: List downloaded wheels
        run: ls -lh wheelhouse/
        shell: bash
      
      - name: Show Python info
        run: |
          python --version
          python -c "import sys; print(f'Platform: {sys.platform}'); import platform; print(f'Machine: {platform.machine()}')"
        shell: bash
      
      - name: Install wheel
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          # Install only the wheel compatible with this Python version
          pip install --verbose --find-links=wheelhouse --no-index pyics
        shell: bash
      
      - name: Test import
        run: python -c "import pyics; print('Import successful')"
      
      - name: Run basic test
        run: |
          python -c '
          import numpy as np
          from pyics import imread, imwrite
          
          # Create test image
          img = np.random.randint(0, 255, (100, 100), dtype=np.uint8)
          
          # Write
          imwrite("test.ics", img)
          print("Write successful")
          
          # Read
          img2, meta = imread("test.ics", fix_dimensions=False)
          print("Read successful")
          
          # Verify
          assert np.array_equal(img, img2)
          print("Data integrity verified")
          '

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist, test_wheels]
    runs-on: ubuntu-latest
    # Only upload on tagged releases
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
      
      - name: Organize artifacts
        run: |
          mkdir -p dist
          mv dist-all/wheels-*/*.whl dist/
          mv dist-all/sdist/*.tar.gz dist/
          ls -lh dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
